postgresql:
  enabled: false
externalPostgresql:
  host: "postgres.local"
  port: 5432
  database: "ghostfolio"
  auth:
    username: user
    database: db
    existingSecret: ghostfolio-db-secret
    secretKeys:
      userPasswordKey: PostgresqlPassword
  options: connect_timeout=300

redis:
  enabled: false
externalRedis:
  host: "redis.local"
  port: 6379
  auth:
    enabled: true
    existingSecret: ghostfolio-db-secret
    existingSecretPasswordKey: RedisPassword
