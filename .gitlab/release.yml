publish:helm:
  stage: publish
  image: "${REGISTRY_URL}/paas/helmpack/chart-releaser:${CHART_RELEASER_VERSION}"
  before_script:
    - git remote add github https://oauth2:${CR_TOKEN}@github.com/${CR_OWNER}/${CR_GIT_REPO}.git --fetch --tags
    - git config --global user.name "$CR_OWNER"
    - git config --global user.email "$GITLAB_USER_EMAIL"
    - cr version
  script:
    - cp README.md chart
    - cp LICENSE chart
    - cr package chart/ --package-path .cr-packages
    - cr upload  --remote github --package-path .cr-packages --skip-existing --owner "$CR_OWNER" --git-repo "$CR_GIT_REPO" --token "$CR_TOKEN" --commit "$CI_COMMIT_SHA"
    - cr index  --remote github --package-path .cr-packages --push --owner "$CR_OWNER" --git-repo "$CR_GIT_REPO" --token "$CR_TOKEN" --charts-repo "https://${CR_OWNER}.github.io/${CR_GIT_REPO}"
  artifacts:
    paths:
      - "*.tgz"
      - index.yaml
    when: always
