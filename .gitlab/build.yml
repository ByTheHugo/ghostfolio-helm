security:gitleaks:
  stage: security
  image:
    name: "${REGISTRY_URL}/paas/zricethezav/gitleaks:${GITLEAKS_VERSION}"
    entrypoint: [""]
  before_script:
    - gitleaks version
  script:
    - gitleaks dir --follow-symlinks -v -f junit -r gitleaks-report.xml
  artifacts:
    paths:
      - gitleaks-report.xml
    reports:
      junit: gitleaks-report.xml

lint:helm:
  stage: lint
  image: "${REGISTRY_URL}/paas/alpine/helm:${HELM_VERSION}"
  before_script:
    - helm version
  script:
    - cd chart
    - helm dependency update
    - |
      helm lint \
        --set "ghostfolio.ACCESS_TOKEN_SALT=superSecretTokenSalt" \
        --set "ghostfolio.JWT_SECRET_KEY=superSecretJwtKey"

tests:pytest:
  stage: tests
  image: "${REGISTRY_URL}/paas/alpine:${ALPINE_VERSION}"
  before_script:
    - apk add --no-cache helm python3 py3-pip
    - python3 -m pip install --no-cache-dir --break-system-packages -r tests/requirements.txt
    - python3 -V
    - python3 -m pytest --version
    - helm dependency update chart
  script:
    - |
      python3 -m pytest tests \
        --retries 2 --retry-delay 5 \
        --junit-xml="${RESULTS_FOLDER}/pytest-${CI_COMMIT_SHORT_SHA}.xml" \
        --html="${RESULTS_FOLDER}/pytest-${CI_COMMIT_SHORT_SHA}.html"
  coverage: '/TOTAL.+ ([0-9]{1,3}%)/'
  artifacts:
    paths:
      - "${RESULTS_FOLDER}"
    reports:
      junit: "$RESULTS_FOLDER/pytest-${CI_COMMIT_SHORT_SHA}.xml"
    expire_in: 1 day
    when: always

deploy:helm:
  extends: .helm-release
  resource_group: deploy-helm

deploy:helm:external:
  extends: .helm-release
  resource_group: deploy-helm-external
  script:
    - |
      helm upgrade \
        --install \
        --set "ghostfolio.ACCESS_TOKEN_SALT=superSecretTokenSalt" \
        --set "ghostfolio.JWT_SECRET_KEY=superSecretJwtKey" \
        --set "global.defaultStorageClass=${HELM_STORAGE_CLASS}" \
        --set "postgresql.enabled=false" \
        --set "externalPostgresql.host=${POSTGRESQL_HOST}" \
        --set "externalPostgresql.port=${POSTGRESQL_PORT}" \
        --set "externalPostgresql.auth.username=${POSTGRESQL_USERNAME}" \
        --set "externalPostgresql.auth.password=${POSTGRESQL_PASSWORD}" \
        --set "externalPostgresql.auth.database=${POSTGRESQL_DATABASE}" \
        --set "redis.enabled=false" \
        --set "externalRedis.host=${REDIS_HOST}" \
        --set "externalRedis.auth.enabled=false" \
        --create-namespace \
        --wait --wait-for-jobs \
        --timeout "$HELM_TIMEOUT" \
        -n "$HELM_NAMESPACE" \
        "${HELM_RELEASE}-${CI_JOB_ID}" ./

cve:helm:trivy:
  stage: cve
  image:
    name: "${REGISTRY_URL}/paas/aquasec/trivy:${TRIVY_VERSION}"
    entrypoint: [""]
  variables:
    TRIVY_EXIT_CODE: 1
  before_script:
      - apk add yq
      - yq --version
      - trivy --version

      # Downloading template format from Github
      - wget https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/junit.tpl -O junit.tpl

      # Update vuln db
      - trivy clean --scan-cache
      - trivy --cache-dir .trivycache/ image --download-db-only --no-progress
  script:
      # We don't wan't to scan chart dependencies
      - yq -i 'del(.dependencies)' chart/Chart.yaml

      # Fail on specified vulnerabilities
      - |
        trivy config \
          --exit-code "$TRIVY_EXIT_CODE" \
          --ignorefile .trivyignore.yaml \
          --severity "$TRIVY_SEVERITY" \
          --helm-set "ghostfolio.ACCESS_TOKEN_SALT=superSecretTokenSalt" \
          --helm-set "ghostfolio.JWT_SECRET_KEY=superSecretJwtKey" \
          --format template \
          --template "@junit.tpl" \
          -o junit-report.xml \
          chart
  cache:
      paths:
      - .trivycache/
  artifacts:
      paths:
          - junit-report.xml
      reports:
          junit: junit-report.xml
  retry: 2
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$IGNORE_TRIVY_CVE == "true"'
      variables:
        TRIVY_EXIT_CODE: 0
    - when: on_success
