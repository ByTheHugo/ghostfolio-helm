{{- $fullname := (include "ghostfolio.fullname" .) -}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}
  labels:
    {{- include "ghostfolio.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "ghostfolio.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secrets.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "ghostfolio.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "ghostfolio.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - secretRef:
                name:  {{ printf "%s-configuration" ($fullname) }}
          env:
            {{- if .Values.ghostfolio.existingSecret }}
            - name: ACCESS_TOKEN_SALT
              valueFrom:
                secretKeyRef:
                  key: {{ .Values.ghostfolio.existingSecretAccessTokenSaltKey }}
                  name: {{ .Values.ghostfolio.existingSecret }}
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  key: {{ .Values.ghostfolio.existingSecretJwtSecretKeyKey }}
                  name: {{ .Values.ghostfolio.existingSecret }}
            {{- end }}
            {{- if and .Values.redis.enabled .Values.redis.auth.enabled .Values.redis.auth.secretRef.name }}
            - name: "REDIS_PASSWORD"
              valueFrom:
                secretKeyRef:
                  key: {{ .Values.redis.auth.secretRef.passwordKey }}
                  name: {{ .Values.redis.auth.secretRef.name }}
            {{- end }}
            {{- if and (not .Values.redis.enabled) .Values.externalRedis.auth.enabled .Values.externalRedis.auth.secretRef.name }}
            - name: "REDIS_PASSWORD"
              valueFrom:
                secretKeyRef:
                  key: {{ .Values.externalRedis.auth.secretRef.passwordKey }}
                  name: {{ .Values.externalRedis.auth.secretRef.name }}
            {{- end }}
            {{- if and .Values.postgresql.enabled .Values.postgresql.auth.secretRef.name }}
            - name: "POSTGRES_USER"
              valueFrom:
                secretKeyRef:
                  key: {{ .Values.postgresql.auth.secretRef.usernameKey }}
                  name: {{ .Values.postgresql.auth.secretRef.name }}
            - name: "POSTGRES_PASSWORD"
              valueFrom:
                secretKeyRef:
                  key: {{ .Values.postgresql.auth.secretRef.passwordKey }}
                  name: {{ .Values.postgresql.auth.secretRef.name }}
            {{- end }}
            {{- if and (not .Values.postgresql.enabled) .Values.externalPostgresql.auth.secretRef.name }}
            - name: "POSTGRES_USER"
              valueFrom:
                secretKeyRef:
                  key: {{ .Values.externalPostgresql.auth.secretRef.usernameKey }}
                  name: {{ .Values.externalPostgresql.auth.secretRef.name }}
            - name: "POSTGRES_PASSWORD"
              valueFrom:
                secretKeyRef:
                  key: {{ .Values.externalPostgresql.auth.secretRef.passwordKey }}
                  name: {{ .Values.externalPostgresql.auth.secretRef.name }}
            {{- else }}
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  key: POSTGRES_USER
                  name: {{ printf "%s-configuration-postgresql" ($fullname) }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: POSTGRES_PASSWORD
                  name:  {{ printf "%s-configuration-postgresql" ($fullname) }}
            {{- end }}
            - name: POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  key: POSTGRES_HOST
                  name:  {{ printf "%s-configuration-postgresql" ($fullname) }}
            - name: POSTGRES_PORT
              valueFrom:
                secretKeyRef:
                  key: POSTGRES_PORT
                  name:  {{ printf "%s-configuration-postgresql" ($fullname) }}
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  key: POSTGRES_DB
                  name: {{ printf "%s-configuration-postgresql" ($fullname) }}
            - name: POSTGRES_OPTIONS
              valueFrom:
                secretKeyRef:
                  key: POSTGRES_OPTIONS
                  name: {{ printf "%s-configuration-postgresql" ($fullname) }}
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)?$(POSTGRES_OPTIONS)"
          {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
